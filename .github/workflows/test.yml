name: Build, Lint, and Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  repository_dispatch:
    types: [trigger]

jobs:
  # ──────────────────────────────────────────────────────────────────────────────
  # Job 1: Static analysis with cppcheck
  # Runs on every push/PR without needing to build Trilinos; gives fast feedback.
  # ──────────────────────────────────────────────────────────────────────────────
  lint:
    name: Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get update && sudo apt-get install -y cppcheck

      - name: Run cppcheck on src/
        run: |
          # cppcheck runs without Trilinos/Epetra/Teuchos headers (they are not
          # installed on the runner; they live inside the Docker build image).
          # We therefore:
          #   1. Suppress missingInclude alongside missingIncludeSystem so
          #      Trilinos/Epetra headers don't cause false-positive failures.
          #   2. Add -I paths for all src/ subdirectories so cross-module
          #      project headers (e.g. Peridigm_Field.hpp) can be resolved.
          #   3. Omit 'style' from --enable; style warnings are too noisy
          #      without full include resolution and would swamp real issues.
          cppcheck \
            --enable=warning,performance,portability \
            --std=c++17 \
            --error-exitcode=1 \
            --inline-suppr \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            -I src/core \
            -I src/damage \
            -I src/contact \
            -I src/compute \
            -I src/materials \
            -I src/io \
            -I src/api \
            -I src/mesh_input \
            -I src/utilities \
            --quiet \
            src/

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 2: Build and test inside Docker
  # The `:test` image (Dockerfile-test) compiles Peridigm and runs `make test`.
  # ──────────────────────────────────────────────────────────────────────────────
  build-test:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: lint        # do not bother building if linting fails

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Only login when we are going to push (main branch), to avoid
        # exposing credentials on external PRs.
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and test Peridigm
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile-test
          # Push the test image only when this is a direct push to master.
          # Pull requests and feature-branch pushes build-only (push: false).
          push: ${{ github.ref == 'refs/heads/master' && github.event_name == 'push' }}
          tags: peridigm/peridigm:test
          cache-from: type=registry,ref=peridigm/peridigm:test
          cache-to: type=inline

  # ──────────────────────────────────────────────────────────────────────────────
  # Job 3: Minify and publish the production image
  # Only runs after a successful build-test on the master branch.
  # ──────────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish Production Image
    runs-on: ubuntu-latest
    needs: build-test
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push minified production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfiles/Dockerfile-master
          push: true
          tags: |
            peridigm/peridigm:latest
            peridigm/peridigm:${{ github.sha }}
          cache-from: type=registry,ref=peridigm/peridigm:latest
          cache-to: type=inline
